<svg width="100%" viewBox="0 0 680 688" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="roughMain" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022 0.035" numOctaves="5" seed="17" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="roughBristle" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.065" numOctaves="4" seed="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="14" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="roughFine" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.06 0.09" numOctaves="3" seed="22" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="9" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Corner brackets at the very edges -->
  <polyline points="2,52 2,2 52,2" fill="none" stroke="var(--color-text-primary)" stroke-width="2.5" stroke-linecap="square" opacity="0.35" style="fill:none;stroke:rgb(20, 20, 19);color:rgb(0, 0, 0);stroke-width:2.5px;stroke-linecap:square;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <polyline points="628,2 678,2 678,52" fill="none" stroke="var(--color-text-primary)" stroke-width="2.5" stroke-linecap="square" opacity="0.35" style="fill:none;stroke:rgb(20, 20, 19);color:rgb(0, 0, 0);stroke-width:2.5px;stroke-linecap:square;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <polyline points="2,628 2,678 52,678" fill="none" stroke="var(--color-text-primary)" stroke-width="2.5" stroke-linecap="square" opacity="0.35" style="fill:none;stroke:rgb(20, 20, 19);color:rgb(0, 0, 0);stroke-width:2.5px;stroke-linecap:square;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <polyline points="678,628 678,678 628,678" fill="none" stroke="var(--color-text-primary)" stroke-width="2.5" stroke-linecap="square" opacity="0.35" style="fill:none;stroke:rgb(20, 20, 19);color:rgb(0, 0, 0);stroke-width:2.5px;stroke-linecap:square;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Main enso body -->
  <path d="M 318,122 A 222,222 0 1 1 488,162" fill="none" stroke="var(--color-text-primary)" stroke-width="62" stroke-linecap="round" opacity="0.95" filter="url(#roughMain)" style="fill:none;stroke:rgb(20, 20, 19);color:rgb(0, 0, 0);stroke-width:62px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.95;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M 320,120 A 220,220 0 1 1 486,160" fill="none" stroke="var(--color-text-primary)" stroke-width="44" stroke-linecap="round" opacity="0.35" filter="url(#roughBristle)" style="fill:none;stroke:rgb(20, 20, 19);color:rgb(0, 0, 0);stroke-width:44px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M 316,124 A 224,224 0 1 1 490,164" fill="none" stroke="var(--color-text-primary)" stroke-width="14" stroke-linecap="round" opacity="0.22" filter="url(#roughMain)" style="fill:none;stroke:rgb(20, 20, 19);color:rgb(0, 0, 0);stroke-width:14px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.22;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Bristle strands -->
  <path d="M 490,164 A 218,218 0 0 1 318,122" fill="none" stroke="var(--color-text-primary)" stroke-width="4" stroke-linecap="round" opacity="0.55" filter="url(#roughBristle)" style="fill:none;stroke:rgb(20, 20, 19);color:rgb(0, 0, 0);stroke-width:4px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.55;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M 492,170 A 215,215 0 0 1 315,125" fill="none" stroke="var(--color-text-primary)" stroke-width="3" stroke-linecap="round" opacity="0.35" filter="url(#roughFine)" style="fill:none;stroke:rgb(20, 20, 19);color:rgb(0, 0, 0);stroke-width:3px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M 494,174 A 212,212 0 0 1 312,128" fill="none" stroke="var(--color-text-primary)" stroke-width="2.5" stroke-linecap="round" opacity="0.22" filter="url(#roughFine)" style="fill:none;stroke:rgb(20, 20, 19);color:rgb(0, 0, 0);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.22;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M 497,178 A 208,208 0 0 1 309,132" fill="none" stroke="var(--color-text-primary)" stroke-width="2" stroke-linecap="round" opacity="0.14" filter="url(#roughBristle)" style="fill:none;stroke:rgb(20, 20, 19);color:rgb(0, 0, 0);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.14;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M 500,182 A 205,205 0 0 1 306,136" fill="none" stroke="var(--color-text-primary)" stroke-width="1.5" stroke-linecap="round" opacity="0.10" filter="url(#roughFine)" style="fill:none;stroke:rgb(20, 20, 19);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M 488,158 A 226,226 0 0 1 322,118" fill="none" stroke="var(--color-text-primary)" stroke-width="3" stroke-linecap="round" opacity="0.30" filter="url(#roughBristle)" style="fill:none;stroke:rgb(20, 20, 19);color:rgb(0, 0, 0);stroke-width:3px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M 486,154 A 230,230 0 0 1 326,115" fill="none" stroke="var(--color-text-primary)" stroke-width="2" stroke-linecap="round" opacity="0.18" filter="url(#roughFine)" style="fill:none;stroke:rgb(20, 20, 19);color:rgb(0, 0, 0);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.18;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M 484,150 A 234,234 0 0 1 330,112" fill="none" stroke="var(--color-text-primary)" stroke-width="1.5" stroke-linecap="round" opacity="0.10" filter="url(#roughFine)" style="fill:none;stroke:rgb(20, 20, 19);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Ink blob at brush lift -->
  <path d="M 340,556 Q 310,568 298,558 Q 288,548 300,540" fill="var(--color-text-primary)" opacity="0.55" filter="url(#roughMain)" style="fill:rgb(20, 20, 19);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.55;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Text -->
  <text x="340" y="316" text-anchor="middle" dominant-baseline="central" style="font-family:var(--font-sans);font-size:72px;font-weight:500;fill:var(--color-text-primary);letter-spacing:14px;fill:rgb(20, 20, 19);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:72px;font-weight:500;text-anchor:middle;dominant-baseline:central">UMAMI</text>
  <text x="340" y="388" text-anchor="middle" dominant-baseline="central" style="font-family:var(--font-sans);font-size:18px;font-weight:400;fill:var(--color-text-secondary);letter-spacing:8px;fill:rgb(61, 61, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:18px;font-weight:400;text-anchor:middle;dominant-baseline:central">SINCE 2021</text>

</svg>