<!DOCTYPE html>
<html lang="en">
<head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════════
//  RENDERER
// ═══════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.18;
document.body.appendChild(renderer.domElement);
window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  cam.aspect = innerWidth / innerHeight;
  cam.updateProjectionMatrix();
});

// ═══════════════════════════════════════════════════════
//  SCENE & CAMERA
// ═══════════════════════════════════════════════════════
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xaaccdd, 0.013);

const cam = new THREE.PerspectiveCamera(82, innerWidth / innerHeight, 0.01, 600);
cam.position.set(0, 0.3, 13);

const clock = new THREE.Clock();

// ═══════════════════════════════════════════════════════
//  LIGHTS
// ═══════════════════════════════════════════════════════
const sunLight = new THREE.DirectionalLight(0xfff3b0, 3.2);
sunLight.position.set(55, 90, -50);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.left = sunLight.shadow.camera.bottom = -70;
sunLight.shadow.camera.right = sunLight.shadow.camera.top = 70;
sunLight.shadow.camera.near = 1;
sunLight.shadow.camera.far = 350;
scene.add(sunLight);
scene.add(new THREE.HemisphereLight(0x5aaddc, 0xe8d090, 1.2));
scene.add(new THREE.AmbientLight(0xffe8a0, 0.55));

// ═══════════════════════════════════════════════════════
//  SKY DOME
// ═══════════════════════════════════════════════════════
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(450, 32, 18),
  new THREE.ShaderMaterial({
    uniforms: {
      uZenith:  { value: new THREE.Color(0x0b4878) },
      uMid:     { value: new THREE.Color(0x3aa0d8) },
      uHorizon: { value: new THREE.Color(0xffd070) },
    },
    vertexShader: `
      varying float vY;
      void main() {
        vY = normalize(position).y;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 uZenith, uMid, uHorizon;
      varying float vY;
      void main() {
        float t = clamp(vY, 0.0, 1.0);
        vec3 c = mix(uHorizon, uMid, pow(t, 0.28));
        c = mix(c, uZenith, pow(t, 1.7));
        gl_FragColor = vec4(c, 1.0);
      }
    `,
    side: THREE.BackSide,
    depthWrite: false,
  })
));

// Sun disc + glow
{
  const g = new THREE.Group();
  const disc = new THREE.Mesh(
    new THREE.CircleGeometry(7, 36),
    new THREE.MeshBasicMaterial({ color: 0xfffce0 })
  );
  g.add(disc);
  const halo = new THREE.Mesh(
    new THREE.CircleGeometry(22, 36),
    new THREE.MeshBasicMaterial({ color: 0xffdd55, transparent: true, opacity: 0.15 })
  );
  halo.position.z = -0.5;
  g.add(halo);
  g.position.set(110, 160, -350);
  g.lookAt(0, 0, 0);
  scene.add(g);
}

// ═══════════════════════════════════════════════════════
//  SAND
// ═══════════════════════════════════════════════════════
{
  const geo = new THREE.PlaneGeometry(240, 240, 70, 70);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    pos.setZ(i, (Math.random() - 0.5) * 0.07 + Math.sin(pos.getX(i)*0.15)*0.04);
  }
  pos.needsUpdate = true;
  geo.computeVertexNormals();
  const sand = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color: 0xddc98a }));
  sand.rotation.x = -Math.PI / 2;
  sand.receiveShadow = true;
  scene.add(sand);
}

// ═══════════════════════════════════════════════════════
//  OCEAN  (PlaneGeometry local-y maps to world-z)
//  waterMesh.position.z = -65
//  Shore at local y ≈ -65  →  world z ≈ 0
//  Deep  at local y ≈ +65  →  world z ≈ -130
// ═══════════════════════════════════════════════════════
const waveUniforms = { uTime: { value: 0.0 } };

const waterMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(240, 140, 120, 60),
  new THREE.ShaderMaterial({
    uniforms: waveUniforms,
    vertexShader: `
      uniform float uTime;
      varying float vH;
      varying vec2  vUV; // local x, local y

      float W(float u, float v, float fu, float fv, float spd, float amp) {
        return sin(u*fu + v*fv + uTime*spd) * amp;
      }

      void main() {
        vec3 pos = position;
        float u = pos.x;
        float v = pos.y; // -65=shore, +65=deep
        vUV = vec2(u, v);

        // Incoming waves (travel from +v toward -v = toward shore)
        float h = 0.0;
        h += W(u, v,  0.00, -0.26, 1.75, 0.58);
        h += W(u, v,  0.14, -0.21, 2.40, 0.36);
        h += W(u, v, -0.11, -0.33, 3.10, 0.23);
        h += W(u, v,  0.28, -0.17, 4.30, 0.14);
        h += W(u, v,  0.00, -0.11, 1.05, 0.80); // long swell
        h += W(u, v, -0.19, -0.09, 0.88, 0.50); // cross swell
        h += W(u, v,  0.07, -0.38, 5.20, 0.09); // chop
        h += W(u, v,  0.40,  0.10, 6.80, 0.05); // ripple

        // Near shore: waves build up; fade at beach edge
        float shoreProx = smoothstep(62.0, -55.0, v);          // 0=deep 1=shore
        float beachFade = smoothstep(-66.0, -59.0, v);         // 0=dry 1=wet
        h *= (0.35 + shoreProx * 1.0) * beachFade;

        pos.z += h;
        vH = h;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
      }
    `,
    fragmentShader: `
      varying float vH;
      varying vec2  vUV;

      void main() {
        float v = vUV.y;
        float u = vUV.x;

        vec3 deep    = vec3(0.04, 0.14, 0.42);
        vec3 mid     = vec3(0.07, 0.43, 0.68);
        vec3 shallow = vec3(0.15, 0.65, 0.77);
        vec3 foam    = vec3(0.88, 0.95, 1.00);

        float shoreT = smoothstep(62.0, -55.0, v);
        vec3 col = mix(deep, mid, shoreT * 0.65);
        col = mix(col, shallow, shoreT * shoreT * 0.5);

        // Wave crest highlight
        float crest = smoothstep(0.7, 1.5, vH);
        col = mix(col, foam, crest * 0.8);

        // Shore foam band (incoming wash)
        float shoreFoam = smoothstep(-38.0, -60.0, v);
        float fAmt = shoreFoam * (0.35 + 0.65 * abs(sin(u*0.28 + vH*3.5 + 0.8)));
        col = mix(col, foam, fAmt * 0.5);

        // Brightness by wave height
        col *= 0.86 + smoothstep(-0.8, 1.2, vH) * 0.17;

        // Specular streak
        float spec = pow(max(0.0, dot(normalize(vec3(-1.0, vH*0.5+0.3, 1.2)),
                                      normalize(vec3(0.4, 1.0, -0.3)))), 22.0) * 0.3;
        col += spec;

        float alpha = 0.78 + shoreT * 0.19;
        gl_FragColor = vec4(col, alpha);
      }
    `,
    transparent: true,
    side: THREE.DoubleSide,
  })
);
waterMesh.rotation.x = -Math.PI / 2;
waterMesh.position.set(0, 0.01, -65);
scene.add(waterMesh);

// ═══════════════════════════════════════════════════════
//  ROCKS & SHELLS
// ═══════════════════════════════════════════════════════
{
  const rMat = new THREE.MeshLambertMaterial({ color: 0x88887a });
  const sMat = new THREE.MeshLambertMaterial({ color: 0xddcfb8 });
  for (let i = 0; i < 55; i++) {
    const r = 0.06 + Math.random() * 0.6;
    const m = new THREE.Mesh(new THREE.DodecahedronGeometry(r, 0), i % 5 === 0 ? sMat : rMat);
    m.position.set(
      (Math.random() - 0.5) * 65,
      r * 0.3,
      1 + Math.random() * 42
    );
    m.rotation.set(Math.random()*3.14, Math.random()*3.14, Math.random()*3.14);
    m.castShadow = m.receiveShadow = true;
    scene.add(m);
  }
  // Some rocks near waterline
  for (let i = 0; i < 15; i++) {
    const r = 0.15 + Math.random() * 0.8;
    const m = new THREE.Mesh(new THREE.DodecahedronGeometry(r, 1), rMat);
    m.position.set((Math.random()-0.5)*45, r*0.2, (Math.random()-0.5)*4);
    m.rotation.set(Math.random()*3,Math.random()*3,Math.random()*3);
    scene.add(m);
  }
}

// ═══════════════════════════════════════════════════════
//  PALM TREES
// ═══════════════════════════════════════════════════════
const allFronds = []; // { pivot, phase, baseX }

function buildPalm(wx, wz) {
  const g = new THREE.Group();
  const s = 0.6 + Math.random() * 1.0;
  const h = (3.5 + Math.random() * 2.8) * s;
  const tx = (Math.random() - 0.5) * 0.30;
  const tz = (Math.random() - 0.5) * 0.24;

  // Trunk
  const trunkMesh = new THREE.Mesh(
    new THREE.CylinderGeometry(0.065 * s, 0.15 * s, h, 8),
    new THREE.MeshLambertMaterial({ color: 0x7a5533 })
  );
  trunkMesh.position.set(Math.sin(tz)*h*0.5, h*0.5, Math.sin(tx)*h*0.5);
  trunkMesh.rotation.x = tx;
  trunkMesh.rotation.z = tz;
  trunkMesh.castShadow = true;
  g.add(trunkMesh);

  // Crown tip (approximate)
  const cx = Math.sin(tz) * h;
  const cy = Math.cos(Math.abs(tx)) * Math.cos(Math.abs(tz)) * h;
  const cz = Math.sin(tx) * h;

  // Coconuts
  const cocoMat = new THREE.MeshLambertMaterial({ color: 0x5c3a18 });
  for (let i = 0; i < 4; i++) {
    const a = (i / 4) * Math.PI * 2;
    const c = new THREE.Mesh(new THREE.SphereGeometry(0.115 * s, 7, 7), cocoMat);
    c.position.set(cx + Math.cos(a)*0.22*s, cy - 0.12*s, cz + Math.sin(a)*0.22*s);
    g.add(c);
  }

  // Fronds
  const nFronds = 8 + Math.floor(Math.random() * 5);
  const greenPalette = [0x2e7d32, 0x388e3c, 0x33691e, 0x1b5e20, 0x43a047];
  for (let i = 0; i < nFronds; i++) {
    const pivot = new THREE.Group();
    pivot.position.set(cx, cy, cz);
    pivot.rotation.y = (i / nFronds) * Math.PI * 2 + (Math.random()-0.5)*0.5;
    const droop = 0.45 + Math.random() * 0.5;
    pivot.rotation.x = droop;

    const fLen = (1.5 + Math.random() * 1.4) * s;
    const lCol = greenPalette[Math.floor(Math.random() * greenPalette.length)];
    const lMat = new THREE.MeshLambertMaterial({ color: lCol, side: THREE.DoubleSide });
    const lMat2 = new THREE.MeshLambertMaterial({ color: lCol + 0x081008, side: THREE.DoubleSide });

    // Central frond plane
    const mainLeaf = new THREE.Mesh(
      new THREE.PlaneGeometry(0.3 * s, fLen),
      lMat
    );
    mainLeaf.position.y = fLen * 0.5;
    pivot.add(mainLeaf);

    // Lateral leaflets
    for (let j = 0; j < 9; j++) {
      const lt = (j + 0.5) / 9;
      const side = j % 2 === 0 ? 1 : -1;
      const wid = 0.2 * s * (1 - lt * 0.55);
      const leaflet = new THREE.Mesh(
        new THREE.PlaneGeometry(wid, fLen * 0.28),
        lMat2
      );
      leaflet.position.set(side * 0.16 * s, lt * fLen, 0);
      leaflet.rotation.z = side * 0.38;
      pivot.add(leaflet);
    }

    g.add(pivot);
    allFronds.push({ pivot, phase: Math.random() * Math.PI * 2, baseX: droop });
  }

  g.position.set(wx, 0, wz);
  scene.add(g);
}

// Dense palm grove — lots of them!
[
  [0,8],[3.5,10.5],[-4,11],[7,14],[-7,13],
  [1,19],[9.5,9],[-9,10],[5,21],[-5,22],
  [12,13],[-12,15],[2.5,6],[-3,7.5],[8.5,26],
  [-8,25],[14,19],[-13,20],[3,31],[-2,29],
  [10,23],[-10,21],[6.5,5],[-6,6],[15.5,11],
  [-15,12],[4,36],[-4,34],[11,31],[-11,29],
  [0,14],[16,22],[-16,25],[7,35],[-7,33],
  [18,15],[-18,17],[20,26],[-20,24],[2,42],
  [9,40],[-9,38],[13,44],[-13,42],[0,48],
].forEach(([x,z]) => buildPalm(x, z));

// ═══════════════════════════════════════════════════════
//  CLOUDS
// ═══════════════════════════════════════════════════════
const cloudList = [];
{
  const cMat = new THREE.MeshLambertMaterial({ color: 0xf4f4f4, transparent: true, opacity: 0.88 });
  const blobs = [
    [0,0,0,2.0],[2.0,0.5,0,1.5],[-1.9,0.4,0.3,1.4],
    [0.5,1.1,0.7,1.2],[-0.6,0.7,-0.8,1.1],[0,0.3,1.4,1.0]
  ];
  for (let i = 0; i < 16; i++) {
    const g = new THREE.Group();
    blobs.forEach(([bx,by,bz,br]) => {
      const m = new THREE.Mesh(new THREE.SphereGeometry(br, 8, 6), cMat);
      m.position.set(bx, by, bz);
      g.add(m);
    });
    g.position.set(
      (Math.random()-0.5) * 320,
      24 + Math.random() * 24,
      -18 - Math.random() * 150
    );
    const sc = 2.8 + Math.random() * 7;
    g.scale.set(sc, 1.3+Math.random()*0.9, sc*0.52);
    scene.add(g);
    cloudList.push({ mesh: g, speed: 0.005 + Math.random() * 0.009 });
  }
}

// ═══════════════════════════════════════════════════════
//  BIRDS (distant V-shapes)
// ═══════════════════════════════════════════════════════
const birds = [];
{
  const bMat = new THREE.LineBasicMaterial({ color: 0x222222 });
  for (let i = 0; i < 12; i++) {
    const pts = [
      new THREE.Vector3(-0.4, 0, 0),
      new THREE.Vector3(0, 0.15, 0),
      new THREE.Vector3(0.4, 0, 0),
    ];
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const line = new THREE.Line(geo, bMat);
    line.position.set(
      (Math.random()-0.5)*140,
      18 + Math.random()*18,
      -30 - Math.random()*100
    );
    line.scale.setScalar(0.6 + Math.random()*1.2);
    scene.add(line);
    birds.push({ mesh: line, speed: 0.02 + Math.random()*0.04, phase: Math.random()*Math.PI*2 });
  }
}

// ═══════════════════════════════════════════════════════
//  CREATURE HELPERS
// ═══════════════════════════════════════════════════════
const M = (c) => new THREE.MeshLambertMaterial({ color: c });
const BOX = (w,h,d,c) => new THREE.Mesh(new THREE.BoxGeometry(w,h,d), M(c));
const SPH = (r,c) => new THREE.Mesh(new THREE.SphereGeometry(r,10,8), M(c));
const CYL = (rt,rb,h,c,n=8) => new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,n), M(c));

// ── T-Rex / Dinosaur ──────────────────────────────────
function makeDino() {
  const g = new THREE.Group();
  const G = 0x3d7225, D = 0x264d18, Y = 0xffee00;

  // Body
  const body = BOX(1.45,1.0,2.3,G); body.position.y=2.65; body.castShadow=true; g.add(body);
  // Neck
  const neck = BOX(0.62,1.05,0.62,G); neck.position.set(0,3.38,-0.88); neck.rotation.x=0.42; g.add(neck);
  // Head
  const head = BOX(0.78,0.62,1.25,G); head.position.set(0,3.95,-1.58); g.add(head);
  // Jaw
  const jaw  = BOX(0.70,0.24,1.08,D); jaw.position.set(0,3.58,-1.68); g.add(jaw);
  // Eyes
  [-0.31,0.31].forEach(ex => { const e=SPH(0.085,Y); e.position.set(ex,4.08,-1.98); g.add(e); });
  // Tail
  const tail = CYL(0.09,0.50,3.1,D,8); tail.rotation.x=-1.22; tail.position.set(0,2.05,1.75); g.add(tail);
  // Legs
  [-0.54,0.54].forEach(lx => {
    const th = BOX(0.46,1.25,0.46,D); th.position.set(lx,1.65,0.32); th.castShadow=true; g.add(th);
    const sh = BOX(0.34,1.05,0.34,D); sh.position.set(lx,0.55,0.58); g.add(sh);
    const ft = BOX(0.40,0.24,0.80,D); ft.position.set(lx,0.08,0.75); g.add(ft);
  });
  // Tiny arms
  [-0.80,0.80].forEach(ax => {
    const arm = BOX(0.24,0.52,0.22,G); arm.position.set(ax,2.70,-0.38); arm.rotation.z=ax>0?0.65:-0.65; g.add(arm);
  });
  return g;
}

// ── Car ───────────────────────────────────────────────
function makeCar() {
  const g = new THREE.Group();
  const cols=[0xee2222,0x2244ee,0x22aa22,0xeeaa11,0xaa22ee,0xee7711,0x22aaee,0xee4488];
  const col = cols[Math.floor(Math.random()*cols.length)];

  const body=BOX(1.82,0.68,4.4,col); body.position.y=0.67; body.castShadow=true; g.add(body);
  const cab=BOX(1.64,0.65,2.4,col);  cab.position.set(0,1.33,-0.08); g.add(cab);

  // Glass
  const gMat=new THREE.MeshLambertMaterial({color:0x99ccff,transparent:true,opacity:0.55});
  const wf=new THREE.Mesh(new THREE.PlaneGeometry(1.50,0.54),gMat); wf.position.set(0,1.33,-1.3); g.add(wf);
  const wr=new THREE.Mesh(new THREE.PlaneGeometry(1.50,0.54),gMat); wr.rotation.y=Math.PI; wr.position.set(0,1.33,1.12); g.add(wr);

  [[0.99,0.38,-1.42],[-0.99,0.38,-1.42],[0.99,0.38,1.42],[-0.99,0.38,1.42]].forEach(([wx,wy,wz]) => {
    const wheel=CYL(0.38,0.38,0.29,0x111111,16); wheel.rotation.z=Math.PI/2; wheel.position.set(wx,wy,wz); wheel.castShadow=true; g.add(wheel);
    const hub=CYL(0.18,0.18,0.31,0xbbbbbb,8); hub.rotation.z=Math.PI/2; hub.position.set(wx,wy,wz); g.add(hub);
  });
  [-0.57,0.57].forEach(lx => {
    const hl=BOX(0.32,0.22,0.05,0xffffc0); hl.position.set(lx,0.80,-2.22); g.add(hl);
    const tl=BOX(0.30,0.20,0.05,0xff2200); tl.position.set(lx,0.80,2.22); g.add(tl);
  });
  return g;
}

// ── Giant Ant ─────────────────────────────────────────
function makeAnt() {
  const g = new THREE.Group();
  const A=0x0d0602, R=0xcc1100;

  const abd=SPH(0.80,A); abd.scale.set(1.0,0.92,1.58); abd.position.set(0,1.0,0.98); abd.castShadow=true; g.add(abd);
  const thor=SPH(0.44,A); thor.position.set(0,0.92,-0.04); g.add(thor);
  const head=SPH(0.41,A); head.position.set(0,0.97,-0.95); g.add(head);
  [-0.25,0.25].forEach(ex => { const e=SPH(0.105,R); e.position.set(ex,1.12,-1.28); g.add(e); });
  [-0.24,0.24].forEach(mx => {
    const mand=CYL(0.04,0.015,0.5,A,6); mand.position.set(mx,0.83,-1.38); mand.rotation.z=mx>0?-0.62:0.62; mand.rotation.x=0.35; g.add(mand);
  });
  [-0.21,0.21].forEach(ax => {
    for(let s=0;s<3;s++){
      const seg=CYL(0.026,0.032,0.52,A,6); seg.position.set(ax*(1+s*0.19),1.28+s*0.32,-1.08-s*0.30); seg.rotation.z=ax>0?(-0.52-s*0.28):(0.52+s*0.28); seg.rotation.x=-0.55-s*0.26; g.add(seg);
    }
  });
  [[-0.54,0.57,-0.27],[0.54,0.57,-0.27],[-0.54,0.57,0.0],[0.54,0.57,0.0],[-0.54,0.57,0.27],[0.54,0.57,0.27]].forEach(([lx,ly,lz],i) => {
    const upper=CYL(0.042,0.032,0.80,A,6); upper.position.set(lx,ly,lz); upper.rotation.z=lx>0?0.95:-0.95; upper.rotation.x=(i%3-1)*0.28; g.add(upper);
    const lower=CYL(0.032,0.015,0.70,A,6); lower.position.set(lx+(lx>0?0.60:-0.60),ly-0.50,lz); lower.rotation.z=lx>0?1.55:-1.55; lower.rotation.x=(i%3-1)*0.22; g.add(lower);
  });
  return g;
}

// ═══════════════════════════════════════════════════════
//  CREATURE SYSTEM
// ═══════════════════════════════════════════════════════
const creatures = [];
const visitorEl = document.getElementById('visitor');
let overlayTmo = null;
let nextSpawn = 4.5;

function announce(msg) {
  visitorEl.textContent = msg;
  visitorEl.style.opacity = '1';
  clearTimeout(overlayTmo);
  overlayTmo = setTimeout(() => { visitorEl.style.opacity = '0'; }, 4200);
}

const defs = [
  { build:makeDino, name:'🦕  Sidan saknas. Du är på en meningslös sida.',             gy:0,    spd:0.045, type:'dino' },
  { build:makeDino, name:'🦖  Sidan saknas. Du är på en meningslös sida.',        gy:0,    spd:0.038, type:'dino' },
  { build:makeDino, name:'🦕  Sidan saknas. Du är på en meningslös sida.',gy:0,    spd:0.050, type:'dino' },
  { build:makeCar,  name:'🚗  Sidan saknas. Du är på en meningslös sida.',  gy:0.38, spd:0.13,  type:'car'  },
  { build:makeCar,  name:'🚙  Sidan saknas. Du är på en meningslös sida.', gy:0.38, spd:0.10,  type:'car'  },
  { build:makeAnt,  name:'🐜  Sidan saknas. Du är på en meningslös sida.', gy:0,    spd:0.030, type:'ant'  },
  { build:makeAnt,  name:'🐜  Sidan saknas. Du är på en meningslös sida.',   gy:0,    spd:0.025, type:'ant'  },
];

function spawnCreature() {
  const def = defs[Math.floor(Math.random() * defs.length)];
  const mesh = def.build();
  const scale = 2.0 + Math.random() * 2.2;
  mesh.scale.setScalar(scale);

  const fromLeft = Math.random() < 0.5;
  const sx = fromLeft ? -(32 + Math.random()*10) : (32 + Math.random()*10);
  const zp = 6 + Math.random() * 15;
  const gy = def.gy * scale;

  mesh.position.set(sx, gy, zp);
  mesh.rotation.y = fromLeft ? -Math.PI/2 : Math.PI/2;
  scene.add(mesh);
  announce(def.name);

  creatures.push({
    mesh, gy,
    dx: fromLeft ? def.spd : -def.spd,
    type: def.type,
    phase: Math.random() * Math.PI * 2,
  });
}

// ═══════════════════════════════════════════════════════
//  ANIMATE
// ═══════════════════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Ocean
  waveUniforms.uTime.value = t;

  // Palm fronds sway in wind
  allFronds.forEach(({ pivot, phase, baseX }) => {
    const w = Math.sin(t*1.88+phase)*0.13 + Math.sin(t*3.15+phase*1.55)*0.045;
    pivot.rotation.x = baseX + w * 0.38;
    pivot.rotation.z = w;
  });

  // Clouds drift
  cloudList.forEach(({ mesh, speed }) => {
    mesh.position.x += speed;
    if (mesh.position.x > 165) mesh.position.x = -165;
  });

  // Birds wheel
  birds.forEach(({ mesh, speed, phase }) => {
    mesh.position.x += speed * 0.4;
    mesh.position.y += Math.sin(t * 0.4 + phase) * 0.01;
    if (mesh.position.x > 170) mesh.position.x = -170;
  });

  // Spawn creatures
  if (t >= nextSpawn) {
    spawnCreature();
    nextSpawn = t + 7 + Math.random() * 10;
  }

  // Move & animate creatures
  for (let i = creatures.length - 1; i >= 0; i--) {
    const c = creatures[i];
    c.mesh.position.x += c.dx;
    const bob = Math.abs(Math.sin(t*(c.type==='car'?9:5) + c.phase));
    const amp = c.type==='car' ? 0.010 : c.type==='dino' ? 0.095 : 0.075;
    c.mesh.position.y = c.gy * c.mesh.scale.x + bob * amp * c.mesh.scale.x;
    if (Math.abs(c.mesh.position.x) > 44) {
      scene.remove(c.mesh);
      creatures.splice(i, 1);
    }
  }

  // ── Camera: small animal wandering path ──────────────
  // Smooth Lissajous-inspired wander through the palm grove
  const ct = t * 0.09;
  const tx = Math.sin(ct * 0.85) * 8.5 + Math.cos(ct * 0.33) * 3.8;
  const tz = 14 + Math.cos(ct * 0.55) * 6.5 + Math.sin(ct * 0.22) * 5.0;
  const ty = 0.26 + Math.abs(Math.sin(t * 2.5)) * 0.09; // walking bob

  cam.position.x += (tx - cam.position.x) * 0.010;
  cam.position.y += (ty - cam.position.y) * 0.10;
  cam.position.z += (tz - cam.position.z) * 0.010;

  // Gaze sweeps: mostly toward water, occasionally sideways
  const gt = t * 0.072;
  const gx = cam.position.x + Math.sin(gt * 1.12) * 5.5;
  const gz = cam.position.z - 5.5 + Math.sin(gt * 0.55) * 5;
  const gy2 = 0.6 + Math.sin(gt * 0.9) * 0.4;
  cam.lookAt(gx, gy2, gz);

  renderer.render(scene, cam);
}

animate();
</script>
